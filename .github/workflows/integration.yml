---
"on":
  workflow_call:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  CHEF_TEST_KITCHEN_ENTERPRISE: true
  machine_user: test_user
  machine_pass: Pass@word1
  SPEC_OPTS: --format progress
  CHEF_LICENSE: accept-no-persist
  # CHEF_LICENSE_KEY: ${{ secrets.CHEF_LICENSE_KEY }}
  CHEF_LICENSE_SERVER: http://hosted-license-service-lb-8000-606952349.us-west-2.elb.amazonaws.com:8000/

jobs:
  dokken:
    env:
      KITCHEN_LOCAL_YAML: kitchen.dokken.yml
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - 3.1
          - 3.4
        os:
          - ubuntu
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Setup Machine
        run: |
          bundle config set --local with 'integration'
          bundle add kitchen-dokken
          bundle install
      - name: Verify Dokken
        run: bundle exec kitchen verify ${{ matrix.os }}
